routing-options {
    router-id 1.1.1.1;
    autonomous-system 65000;
}
routing-instances {
    test_vrf {
        instance-type vrf;
        vrf-import policy1;
        vrf-target target:1:1;
        route-distinguisher 1:1;
        protocols {
            evpn {
                ip-prefix-routes {
                    import policy2;
                    vni 1000;
                    advertise direct-nexthop;
                    encapsulation vxlan;
                }
            }
        }
    }
}
